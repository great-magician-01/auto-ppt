<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4263eb"/>
      <stop offset="1" stop-color="#2f49c0"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9d6bff"/>
      <stop offset="1" stop-color="#7B2FF7"/>
    </linearGradient>
  </defs>

  <!-- 蓝色圆角背景 -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- 卡片投影/背层（深一档蓝灰，向右下偏移营造厚度） -->
  <rect x="288" y="340" width="540" height="420" rx="44" ry="44" fill="#c2cbef"/>

  <!-- 白色幻灯片卡片 -->
  <rect x="248" y="300" width="540" height="420" rx="44" ry="44" fill="#ffffff"/>

  <!-- 标题条（主蓝，与背景呼应） -->
  <rect x="298" y="358" width="440" height="72" rx="20" ry="20" fill="#3b5bdb"/>

  <!-- 正文行（浅灰） -->
  <rect x="298" y="482" width="392" height="34" rx="17" ry="17" fill="#d7dce8"/>
  <rect x="298" y="548" width="330" height="34" rx="17" ry="17" fill="#d7dce8"/>
  <rect x="298" y="614" width="248" height="34" rx="17" ry="17" fill="#d7dce8"/>

  <!-- AI 闪光（右上，紫色四角星） -->
  <path d="M778,168 Q778,250 696,250 Q778,250 778,332 Q778,250 860,250 Q778,250 778,168 Z" fill="url(#spark)"/>
  <path d="M778,214 Q778,250 742,250 Q778,250 778,286 Q778,250 814,250 Q778,250 778,214 Z" fill="#ffffff" opacity="0.85"/>

  <!-- 小闪光（左上，平衡构图） -->
  <path d="M298,150 Q298,180 268,180 Q298,180 298,210 Q298,180 328,180 Q298,180 298,150 Z" fill="#b6a6ff"/>
</svg>
